version: '3.8'

services:
  # Neo4j图数据库
  neo4j:
    image: neo4j:latest
    container_name: equipment_neo4j
    ports:
      - "7474:7474"  # HTTP端口
      - "7687:7687"  # Bolt端口
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    networks:
      - equipment_network

  # MySQL关系数据库
  mysql:
    image: mysql:8.0
    container_name: equipment_mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=equipment_fault
      - MYSQL_USER=equipment
      - MYSQL_PASSWORD=equipment123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - equipment_network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: equipment_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - equipment_network

  # 大模型服务
  llm_service:
    build:
      context: .
      dockerfile: 07_llm_deployment/Dockerfile
    container_name: equipment_llm
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=THUDM/chatglm2-6b
      - DEVICE=auto
      - HOST=0.0.0.0
      - PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - neo4j
      - redis
    networks:
      - equipment_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # 数据采集服务
  data_collector:
    build:
      context: .
      dockerfile: 01_data_collection/Dockerfile
    container_name: equipment_collector
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - neo4j
      - mysql
    networks:
      - equipment_network
    command: ["python", "01_data_collection/web_scraping/main.py"]

  # 信息抽取服务
  extraction_service:
    build:
      context: .
      dockerfile: 03_information_extraction/Dockerfile
    container_name: equipment_extraction
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      - neo4j
      - llm_service
    networks:
      - equipment_network
    command: ["python", "03_information_extraction/llm_extraction/llm_extractor.py"]

  # 知识图谱构建服务
  graph_builder:
    build:
      context: .
      dockerfile: 04_knowledge_graph/Dockerfile
    container_name: equipment_graph
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - neo4j
      - extraction_service
    networks:
      - equipment_network
    command: ["python", "04_knowledge_graph/neo4j_construction/build_graph.py"]

  # 问答系统服务
  qa_service:
    build:
      context: .
      dockerfile: 05_qa_system/Dockerfile
    container_name: equipment_qa
    ports:
      - "8001:8001"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - LLM_SERVICE_URL=http://llm_service:8000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - neo4j
      - llm_service
    networks:
      - equipment_network

  # Web前端服务
  web_frontend:
    build:
      context: .
      dockerfile: 06_deployment/web_interface/Dockerfile
    container_name: equipment_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8001
      - REACT_APP_LLM_API_URL=http://localhost:8000
    depends_on:
      - qa_service
      - llm_service
    networks:
      - equipment_network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: equipment_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./06_deployment/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./06_deployment/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - web_frontend
      - qa_service
      - llm_service
    networks:
      - equipment_network

  # 监控服务
  monitoring:
    image: prom/prometheus:latest
    container_name: equipment_monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./06_deployment/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - equipment_network

  # 日志收集服务
  logstash:
    image: docker.elastic.co/logstash/logstash:8.8.0
    container_name: equipment_logstash
    volumes:
      - ./06_deployment/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
      - ./logs:/var/log/equipment
    depends_on:
      - elasticsearch
    networks:
      - equipment_network

  # 搜索引擎
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: equipment_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - equipment_network

  # 可视化服务
  kibana:
    image: docker.elastic.co/kibana/kibana:8.8.0
    container_name: equipment_kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - equipment_network

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  mysql_data:
  redis_data:
  prometheus_data:
  elasticsearch_data:

networks:
  equipment_network:
    driver: bridge