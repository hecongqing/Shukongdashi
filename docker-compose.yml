version: '3.8'

services:
  # Neo4j 图数据库
  neo4j:
    image: neo4j:5.9-community
    container_name: kg_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/knowledge123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - kg_network

  # Redis 缓存数据库
  redis:
    image: redis:7-alpine
    container_name: kg_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    networks:
      - kg_network

  # MongoDB 文档数据库
  mongodb:
    image: mongo:6.0
    container_name: kg_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongo123
    volumes:
      - mongodb_data:/data/db
    networks:
      - kg_network

  # Elasticsearch 搜索引擎
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: kg_elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - kg_network

  # Kibana 可视化界面
  kibana:
    image: docker.elastic.co/kibana/kibana:8.8.0
    container_name: kg_kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - kg_network

  # 知识图谱后端服务
  kg_backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kg_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=knowledge123
      - REDIS_URL=redis://:redis123@redis:6379
      - MONGODB_URL=mongodb://admin:mongo123@mongodb:27017
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - neo4j
      - redis
      - mongodb
      - elasticsearch
    networks:
      - kg_network

  # 前端界面
  kg_frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: kg_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://kg_backend:8000
    depends_on:
      - kg_backend
    networks:
      - kg_network

  # Jupyter Notebook 开发环境
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: kg_jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
      - ./models:/home/jovyan/models
    networks:
      - kg_network

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  redis_data:
  mongodb_data:
  elasticsearch_data:

networks:
  kg_network:
    driver: bridge