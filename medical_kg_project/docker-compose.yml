version: '3.8'

services:
  # Neo4j图数据库
  neo4j:
    image: neo4j:5.13.0
    container_name: medical_kg_neo4j
    ports:
      - "7474:7474"  # Web界面
      - "7687:7687"  # Bolt协议
    environment:
      - NEO4J_AUTH=neo4j/medicalkg123  # 默认用户名/密码
      - NEO4J_dbms_memory_pagecache_size=2G
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_heap_initial__size=1G
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/import:/var/lib/neo4j/import
      - ./neo4j/plugins:/plugins
    networks:
      - medical_kg_network

  # Elasticsearch全文搜索
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: medical_kg_es
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
    networks:
      - medical_kg_network

  # Kibana可视化界面（可选）
  kibana:
    image: kibana:8.11.0
    container_name: medical_kg_kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - medical_kg_network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: medical_kg_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    command: redis-server --appendonly yes
    networks:
      - medical_kg_network

  # Label Studio数据标注平台
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: medical_kg_label_studio
    ports:
      - "8080:8080"
    environment:
      - DJANGO_DB=default
      - POSTGRE_NAME=label_studio
      - POSTGRE_USER=postgres
      - POSTGRE_PASSWORD=postgres
      - POSTGRE_PORT=5432
      - POSTGRE_HOST=postgres
    volumes:
      - ./label-studio/data:/label-studio/data
    depends_on:
      - postgres
    networks:
      - medical_kg_network

  # PostgreSQL数据库（用于Label Studio）
  postgres:
    image: postgres:14-alpine
    container_name: medical_kg_postgres
    environment:
      - POSTGRES_DB=label_studio
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - medical_kg_network

  # API服务
  api_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical_kg_api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=medicalkg123
      - REDIS_URL=redis://redis:6379
      - ES_URL=http://elasticsearch:9200
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - neo4j
      - elasticsearch
      - redis
    networks:
      - medical_kg_network
    command: uvicorn src.qa_system.medical_qa:app --host 0.0.0.0 --port 8000 --reload

  # Streamlit Web界面
  web_ui:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: medical_kg_web
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api_server:8000
    volumes:
      - ./src/web:/app
    depends_on:
      - api_server
    networks:
      - medical_kg_network
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0

networks:
  medical_kg_network:
    driver: bridge

volumes:
  neo4j_data:
  es_data:
  redis_data:
  postgres_data:
  label_studio_data: